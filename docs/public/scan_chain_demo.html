<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFT 扫描链 (Scan Chain) — 交互式演示</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #0d1117; color: #c9d1d9;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 20px;
}
h1 { font-size: 1.4rem; color: #58a6ff; margin-bottom: 4px; }
.subtitle { font-size: 0.85rem; color: #8b949e; margin-bottom: 16px; }

.controls {
  display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
  margin-bottom: 12px;
  background: #161b22; border: 1px solid #30363d; border-radius: 10px;
  padding: 10px 16px; max-width: 980px; width: 100%;
}
.ctrl-group { display: flex; flex-direction: column; gap: 2px; align-items: center; }
.ctrl-group label { font-size: 0.68rem; color: #8b949e; }
.btn-row { display: flex; gap: 3px; }
.btn-row button {
  background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
  padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.76rem;
  transition: background 0.15s; white-space: nowrap;
}
.btn-row button:hover { background: #30363d; }
.btn-row button.active { background: #1f6feb; border-color: #58a6ff; color: #fff; }

#sc-canvas { width: 100%; max-width: 980px; border-radius: 10px; }

.step-log {
  max-width: 980px; width: 100%; margin-top: 10px;
  background: #161b22; border: 1px solid #30363d; border-radius: 10px;
  padding: 10px 16px; font-size: 0.76rem; color: #8b949e;
  max-height: 140px; overflow-y: auto;
}
.step-log .entry { padding: 3px 0; border-bottom: 1px solid #1a1f27; font-family: 'Cascadia Code', 'Consolas', monospace; }
.step-log .entry b { color: #e6edf3; }
.step-log .scan { color: #f0883e; }
.step-log .func { color: #58a6ff; }
</style>
</head>
<body>
<h1>DFT 扫描链 (Scan Chain)</h1>
<div class="subtitle">可测试性设计核心 — 将触发器串联为移位寄存器，实现芯片内部状态的可控可观测</div>

<div class="controls">
  <div class="ctrl-group">
    <label>工作模式</label>
    <div class="btn-row" id="se-btns">
      <button data-se="0" class="active">功能 (SE=0)</button>
      <button data-se="1">扫描移位 (SE=1)</button>
    </div>
  </div>
  <div class="ctrl-group">
    <label>时钟</label>
    <div class="btn-row">
      <button id="clk-step" style="font-size:0.9rem;">⏵ 单步触发</button>
      <button id="clk-auto">▶ 自动</button>
    </div>
  </div>
  <div class="ctrl-group">
    <label>扫描输入 (SI)</label>
    <div class="btn-row" id="si-btns">
      <button data-si="0">0</button>
      <button data-si="1" class="active">1</button>
    </div>
  </div>
  <div class="ctrl-group">
    <label>自动速度</label>
    <input type="range" id="speed-slider" min="1" max="8" step="1" value="3" style="width:80px;">
  </div>
  <div class="ctrl-group">
    <button id="reset-btn" style="background:#21262d;border:1px solid #30363d;color:#f85149;padding:5px 12px;border-radius:6px;cursor:pointer;">⟳ 全部复位</button>
  </div>
</div>

<canvas id="sc-canvas" height="460"></canvas>

<div class="step-log" id="step-log">
  <div class="entry" style="color:#484f58;">点击「单步触发」开始...</div>
</div>

<script>
(function () {
  const N_FF = 4;
  const canvas = document.getElementById('sc-canvas');
  const ctx = canvas.getContext('2d');

  // state
  let se = 0;
  let si = 1;
  let ffs = [0, 1, 0, 0];    // current FF values
  let prevFfs = [0, 1, 0, 0]; // pre-clock values
  let funcD = [1, 0, 1, 0];
  let stepCount = 0;
  let autoRunning = false;
  let autoTimer = null;
  let speed = 3;

  // animation state
  let animStart = 0;
  let animDuration = 420; // ms
  let animating = false;
  let animNewFfs = null;
  let animPrevFfs = null;
  let animRaf = null;
  let transitionBits = []; // which bits are transitioning (to highlight)

  function startAnim(newVals) {
    animPrevFfs = ffs.slice();
    animNewFfs = newVals.slice();
    transitionBits = [];
    for (let i = 0; i < N_FF; i++) {
      if (animPrevFfs[i] !== animNewFfs[i]) transitionBits.push(i);
    }
    animStart = performance.now();
    animating = true;
    if (animRaf) cancelAnimationFrame(animRaf);
    animRaf = requestAnimationFrame(animLoop);
  }

  function animLoop(ts) {
    const elapsed = ts - animStart;
    const t = Math.min(elapsed / animDuration, 1);
    // easeInOutCubic
    const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    draw(ease);
    if (t < 1) {
      animRaf = requestAnimationFrame(animLoop);
    } else {
      animating = false;
      ffs = animNewFfs.slice();
      draw(1);
    }
  }

  function clkTick() {
    if (animating) return; // don't interrupt animation
    const next = ffs.slice();
    if (se) {
      next[0] = si;
      for (let i = 1; i < N_FF; i++) next[i] = ffs[i - 1];
    } else {
      for (let i = 0; i < N_FF; i++) next[i] = funcD[i];
    }
    prevFfs = ffs.slice();
    stepCount++;
    addLogEntry(next);
    startAnim(next);
  }

  function addLogEntry(next) {
    const log = document.getElementById('step-log');
    const div = document.createElement('div');
    div.className = 'entry';
    if (se) {
      div.innerHTML = '<span class="scan">[Shift]</span> 第<b>' + stepCount + '</b>拍：' +
        'SI=' + si + ' → ' +
        prevFfs.map((v, i) => 'FF' + i + '=' + v).join(' → ') + ' → SO' +
        '&nbsp;&nbsp;⇒&nbsp;&nbsp;新状态：<b>' +
        next.map(v => v).join(' ') + '</b>';
    } else {
      div.innerHTML = '<span class="func">[Capture]</span> 第<b>' + stepCount + '</b>拍：' +
        'D=[' + funcD.join(' ') + '] → ' +
        '捕获到 FF = <b>' + next.join(' ') + '</b>';
    }
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    // keep max 50 entries
    while (log.children.length > 50) log.removeChild(log.firstChild);
    if (log.children.length === 1 && log.firstChild.textContent.includes('点击')) {
      log.removeChild(log.firstChild);
    }
  }

  function reset() {
    ffs = [0, 1, 0, 0];
    prevFfs = [0, 1, 0, 0];
    stepCount = 0;
    animating = false;
    if (animRaf) cancelAnimationFrame(animRaf);
    document.getElementById('step-log').innerHTML =
      '<div class="entry" style="color:#484f58;">已复位，点击「单步触发」开始...</div>';
    draw(1);
  }

  // ==============================
  //  DRAWING
  // ==============================
  function draw(animT) {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = canvas.clientWidth;
    const h = +canvas.getAttribute('height');
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);

    const scanColor = '#f0883e';
    const funcColor = '#58a6ff';
    const onColor = '#7ee787';
    const flashColor = '#f78166';

    // interpolate FF values during animation
    function ffVal(i) {
      if (!animating) return ffs[i];
      // during animation, show old value then snap to new at threshold
      if (animT < 0.35) return animPrevFfs[i];
      return animNewFfs[i];
    }

    function isTransitioning(i) {
      return animating && transitionBits.includes(i);
    }

    // layout: each DFX cell is a grouped block (MUX + DFF)
    const cellW = 150, cellH = 120;
    const gap = 20;
    const totalW = N_FF * cellW + (N_FF - 1) * gap;
    const startX = (w - totalW) / 2;
    const cellY = 110;

    // === Title area ===
    ctx.font = 'bold 13px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    const modeText = se ? '扫描移位 (Shift) — 触发器串联为移位寄存器' : '功能模式 (Capture) — 触发器按正常路径捕获数据';
    ctx.fillStyle = se ? scanColor : funcColor;
    ctx.fillText(modeText, w / 2, 28);

    // SE indicator bar
    const barY = 44;
    ctx.fillStyle = se ? 'rgba(240,136,62,0.12)' : 'rgba(88,166,255,0.12)';
    ctx.fillRect(startX, barY, totalW, 22);
    ctx.strokeStyle = se ? 'rgba(240,136,62,0.3)' : 'rgba(88,166,255,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(startX, barY, totalW, 22);
    ctx.fillStyle = se ? scanColor : funcColor;
    ctx.font = 'bold 11px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText('SE = ' + se + (se ? '  (所有 MUX 选通扫描输入)' : '  (所有 MUX 选通功能输入)'), w / 2, barY + 16);

    // === SI source ===
    const siX = startX - 90;
    const siY = cellY + cellH * 0.55;
    const siBoxW = 44, siBoxH = 36;
    // SI box
    ctx.fillStyle = '#161b22';
    ctx.strokeStyle = se ? scanColor : '#30363d';
    ctx.lineWidth = se ? 3 : 1.5;
    ctx.beginPath();
    roundRect(ctx, siX, siY - siBoxH / 2, siBoxW, siBoxH, 6);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#8b949e';
    ctx.font = 'bold 11px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('SI', siX + siBoxW / 2, siY - 4);
    ctx.fillStyle = si ? onColor : '#484f58';
    ctx.font = 'bold 18px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText(si, siX + siBoxW / 2, siY + 16);

    // SI → FF0 scan line
    ctx.strokeStyle = se ? scanColor : '#30363d';
    ctx.lineWidth = se ? 2.8 : 1;
    ctx.setLineDash(se ? [] : [4, 4]);
    ctx.beginPath();
    ctx.moveTo(siX + siBoxW, siY);
    ctx.lineTo(startX + 14, siY);
    ctx.stroke();
    ctx.setLineDash([]);
    // arrow
    if (se) {
      ctx.fillStyle = scanColor;
      ctx.beginPath();
      ctx.moveTo(startX + 14, siY);
      ctx.lineTo(startX + 6, siY - 5);
      ctx.lineTo(startX + 6, siY + 5);
      ctx.closePath(); ctx.fill();
    }

    // === SO output ===
    const soX = startX + totalW + 46;
    const soY = siY;
    ctx.fillStyle = '#161b22';
    ctx.strokeStyle = se ? scanColor : '#30363d';
    ctx.lineWidth = se ? 3 : 1.5;
    ctx.beginPath();
    roundRect(ctx, soX, soY - siBoxH / 2, siBoxW, siBoxH, 6);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#8b949e';
    ctx.font = 'bold 11px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText('SO', soX + siBoxW / 2, soY - 4);
    const soVal = animating ? (animT < 0.35 ? animPrevFfs[N_FF - 1] : animNewFfs[N_FF - 1]) : ffs[N_FF - 1];
    ctx.fillStyle = soVal ? onColor : '#484f58';
    ctx.font = 'bold 18px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText(soVal, soX + siBoxW / 2, soY + 16);

    // Last FF → SO line
    ctx.strokeStyle = se ? scanColor : '#30363d';
    ctx.lineWidth = se ? 2.8 : 1;
    ctx.beginPath();
    const lastCellR = startX + (N_FF - 1) * (cellW + gap) + cellW;
    ctx.moveTo(lastCellR, siY);
    ctx.lineTo(soX, siY);
    ctx.stroke();
    if (se) {
      ctx.fillStyle = scanColor;
      ctx.beginPath();
      ctx.moveTo(soX, siY);
      ctx.lineTo(soX + 8, siY - 5);
      ctx.lineTo(soX + 8, siY + 5);
      ctx.closePath(); ctx.fill();
    }

    // === DFX cells ===
    for (let i = 0; i < N_FF; i++) {
      const cx = startX + i * (cellW + gap);
      const val = ffVal(i);
      const transitioning = isTransitioning(i);
      const flash = transitioning && animT > 0.3 && animT < 0.7;

      // cell background
      ctx.fillStyle = '#161b22';
      ctx.strokeStyle = flash ? flashColor : '#30363d';
      ctx.lineWidth = flash ? 3 : 1.5;
      ctx.beginPath();
      roundRect(ctx, cx, cellY, cellW, cellH, 10);
      ctx.fill(); ctx.stroke();

      // cell label
      ctx.fillStyle = '#484f58';
      ctx.font = 'bold 10px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('DFX' + i, cx + cellW / 2, cellY + 14);

      // --- MUX inside the cell ---
      const muxW = 40, muxH = 28;
      const muxX = cx + 10;
      const muxY = cellY + 32;
      // MUX trapezoid
      ctx.fillStyle = '#0d1117';
      ctx.strokeStyle = se ? scanColor : funcColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(muxX, muxY);                   // left-top (D)
      ctx.lineTo(muxX + muxW, muxY + muxH * 0.35); // right
      ctx.lineTo(muxX, muxY + muxH);             // left-bottom (SI)
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#8b949e';
      ctx.font = '8px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('MUX', muxX + muxW / 2 + 2, muxY + muxH / 2 + 3);

      // selected input dot
      const selDotY = se ? muxY + muxH - 4 : muxY + 4;
      ctx.fillStyle = se ? scanColor : funcColor;
      ctx.beginPath();
      ctx.arc(muxX + muxW * 0.5, selDotY, 4, 0, Math.PI * 2);
      ctx.fill();

      // --- D input pin (top of cell) ---
      const dPinX = cx + cellW * 0.38;
      ctx.strokeStyle = se ? '#21262d' : funcColor;
      ctx.lineWidth = se ? 1 : 2;
      ctx.beginPath();
      ctx.moveTo(dPinX, cellY);
      ctx.lineTo(dPinX, cellY - 26);
      ctx.arc(dPinX - 8, cellY - 34, 8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = '#161b22';
      ctx.beginPath();
      ctx.arc(dPinX - 8, cellY - 34, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = se ? '#30363d' : funcColor;
      ctx.font = 'bold 11px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(funcD[i], dPinX - 8, cellY - 30);
      ctx.fillStyle = '#8b949e';
      ctx.font = '8px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
      ctx.fillText('D', dPinX - 8, cellY - 16);

      // MUX → DFF connection
      ctx.strokeStyle = '#8b949e';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(muxX + muxW, muxY + muxH / 2);
      ctx.lineTo(cx + cellW - 22, muxY + muxH / 2);
      ctx.stroke();

      // --- DFF inside the cell ---
      const dffW = 54, dffH = 56;
      const dffX = cx + cellW - dffW - 10;
      const dffY = cellY + 32;
      ctx.fillStyle = '#0d1117';
      ctx.strokeStyle = flash ? flashColor : (val ? '#3fb950' : '#30363d');
      ctx.lineWidth = flash ? 3 : (val ? 2 : 1.5);
      ctx.beginPath();
      roundRect(ctx, dffX, dffY, dffW, dffH, 6);
      ctx.fill(); ctx.stroke();

      // DFF label
      ctx.fillStyle = '#484f58';
      ctx.font = '8px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('DFF', dffX + dffW / 2, dffY + 14);

      // DFF value - big
      const displayVal = flash ? animNewFfs[i] : val;
      ctx.fillStyle = displayVal ? onColor : '#484f58';
      ctx.font = 'bold 22px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
      ctx.fillText(displayVal, dffX + dffW / 2, dffY + 44);

      // CLK pin (small triangle at bottom of DFF)
      const clkPinX = dffX + dffW / 2;
      const clkPinY = dffY + dffH;
      const clkActive = animating && animT < 0.35;
      ctx.fillStyle = clkActive ? '#f0883e' : '#484f58';
      ctx.beginPath();
      ctx.moveTo(clkPinX - 5, clkPinY);
      ctx.lineTo(clkPinX, clkPinY + 8);
      ctx.lineTo(clkPinX + 5, clkPinY);
      ctx.closePath(); ctx.fill();

      // scan chain connections between cells
      if (i < N_FF - 1) {
        // this FF Q → next FF MUX scan input
        const qX = dffX + dffW / 2;
        const qY = dffY + dffH;
        const nextMuxX = cx + cellW + gap + 10;
        const nextMuxBotY = cellY + 32 + muxH;

        // Q output label
        ctx.fillStyle = val ? onColor : '#484f58';
        ctx.font = 'bold 10px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Q=' + val, qX, qY + 18);

        // scan wire: this Q → next MUX scan input
        ctx.strokeStyle = se ? scanColor : '#30363d';
        ctx.lineWidth = se ? 2.5 : 1;
        ctx.setLineDash(se ? [] : [4, 4]);
        ctx.beginPath();
        ctx.moveTo(qX, qY + 24);
        ctx.lineTo(qX, qY + 36);
        ctx.lineTo(nextMuxX, qY + 36);
        ctx.lineTo(nextMuxX, nextMuxBotY);
        ctx.stroke();
        ctx.setLineDash([]);

        // animated traveling dot on scan path
        if (se && animating && transitionBits.includes(i) && animT > 0.25 && animT < 0.75) {
          const localT = (animT - 0.25) / 0.5; // 0..1
          const dotX = qX + (nextMuxX - qX) * localT;
          const dotY = qY + 24 + (nextMuxBotY - (qY + 24)) * localT;
          ctx.fillStyle = flashColor;
          ctx.shadowColor = flashColor;
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        if (se && i === 0 && animating && transitionBits.includes(0) && animT > 0.1 && animT < 0.5) {
          // SI→FF0 dot
          const lt = (animT - 0.1) / 0.4;
          const dx = siX + siBoxW + (startX + 14 - (siX + siBoxW)) * lt;
          ctx.fillStyle = flashColor;
          ctx.shadowColor = flashColor;
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(dx, siY, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      } else {
        // last FF Q
        const qX = dffX + dffW / 2;
        const qY = dffY + dffH;
        ctx.fillStyle = val ? onColor : '#484f58';
        ctx.font = 'bold 10px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Q=' + val + ' → SO', qX, qY + 18);
      }
    }

    // === Step counter ===
    ctx.fillStyle = '#8b949e';
    ctx.font = '10px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('时钟拍数: ' + stepCount, w - 20, h - 12);

    // === Click hint on D values ===
    ctx.fillStyle = '#30363d';
    ctx.font = '9px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('点击 D 值可翻转', w / 2, cellY - 44);
  }

  function roundRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.arcTo(x + w, y, x + w, y + r, r);
    c.lineTo(x + w, y + h - r);
    c.arcTo(x + w, y + h, x + w - r, y + h, r);
    c.lineTo(x + r, y + h);
    c.arcTo(x, y + h, x, y + h - r, r);
    c.lineTo(x, y + r);
    c.arcTo(x, y, x + r, y, r);
    c.closePath();
  }

  // ==============================
  //  EVENT HANDLERS
  // ==============================
  document.getElementById('se-btns').addEventListener('click', function (e) {
    if (e.target.tagName !== 'BUTTON') return;
    se = +e.target.dataset.se;
    this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    draw(1);
  });

  document.getElementById('clk-step').addEventListener('click', clkTick);

  document.getElementById('clk-auto').addEventListener('click', function () {
    autoRunning = !autoRunning;
    this.textContent = autoRunning ? '⏸ 停止' : '▶ 自动';
    this.classList.toggle('active', autoRunning);
    if (autoRunning) {
      autoTimer = setInterval(clkTick, 1000 / speed);
    } else {
      clearInterval(autoTimer);
    }
  });

  document.getElementById('si-btns').addEventListener('click', function (e) {
    if (e.target.tagName !== 'BUTTON') return;
    si = +e.target.dataset.si;
    this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    draw(1);
  });

  document.getElementById('speed-slider').addEventListener('input', function () {
    speed = +this.value;
    if (autoRunning) { clearInterval(autoTimer); autoTimer = setInterval(clkTick, 1000 / speed); }
  });

  document.getElementById('reset-btn').addEventListener('click', reset);

  // click D values to toggle
  canvas.addEventListener('click', function (e) {
    if (animating) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const cellW = 150, gap = 20;
    const totalW = N_FF * cellW + (N_FF - 1) * gap;
    const startX = (canvas.clientWidth - totalW) / 2;
    const cellY = 110;
    for (let i = 0; i < N_FF; i++) {
      const cx = startX + i * (cellW + gap);
      const dPinX = cx + cellW * 0.38;
      const dPinY = cellY - 34;
      if (Math.abs(mx - dPinX) < 18 && Math.abs(my - dPinY) < 16) {
        funcD[i] = funcD[i] ? 0 : 1;
        draw(1);
        break;
      }
    }
  });

  window.addEventListener('resize', () => draw(animating ? 0.5 : 1));
  draw(1);
})();
</script>
</body>
